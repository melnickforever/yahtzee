        - generic [ref=e142]:
          - heading "Мета гри" [level=3] [ref=e143]
          - paragraph [ref=e144]: Набрати найбільшу кількість очок, кидаючи п'ять кісток для створення певних комбінацій.
          - heading "Хід гри" [level=3] [ref=e145]
          - list [ref=e146]:
            - listitem [ref=e147]: Кожен гравець по черзі кидає п'ять кісток.
            - listitem [ref=e148]: Гравець може кидати кістки до трьох разів за хід, відкладаючи потрібні кістки та перекидаючи інші.
            - listitem [ref=e149]: Після третього кидка (або раніше) гравець повинен записати результат в одну категорію.
          - heading "Особливі правила" [level=3] [ref=e150]
          - list [ref=e151]:
            - listitem [ref=e152]: "Бонус Yahtzee: якщо гравець кидає додаткове Yahtzee після першого — бонус +100 очок за кожне наступне. Увага: бонус +100 нараховується лише якщо клітинка Yahtzee заповнена значенням 50. Якщо ви записали туди 0 — бонусу немає, але результат все одно потрібно вписати згідно з Правилом джокера."
            - listitem [ref=e153]: "Правило джокера: спрацьовує, коли ви кидаєте Yahtzee, але клітинка Yahtzee вже заповнена. Спочатку потрібно записати результат у відповідну верхню категорію (за числом кісток). Якщо і вона заповнена — можна вписати результат як джокер у будь-яку вільну категорію нижньої секції з повними очками (Фул-хаус = 25, Мала стріт = 30, Велика стріт = 40, або сума кісток для інших)."
            - listitem [ref=e154]: "Запис нуля: якщо жодна з вільних категорій не підходить під ваш кидок, ви повинні обрати одну з них і записати 0. Це частина стратегії — вирішуйте, яку категорію найменш шкода пожертвувати."
          - heading "Ключовий момент" [level=3] [ref=e155]
          - paragraph [ref=e156]: Лише одна категорія може бути використана за хід. Заповнена категорія більше не може бути використана в цій грі.
          - heading "Кінець гри" [level=3] [ref=e157]
          - paragraph [ref=e158]: Гра закінчується, коли всі 13 категорій заповнені у кожного гравця. Після цього підраховується загальна сума — гравець з найвищим результатом перемагає.
